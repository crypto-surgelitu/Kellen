  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .vibrant-gradient-bg { background: linear-gradient(135deg, #ff709f 0%, #ffd709 50%, #9ae1ff 100%); background-size: 400% 400%; }
    .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .bouncy-hover:hover { transform: scale(1.05); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .bouncy-hover:active { transform: scale(0.92); }
    .floating-heart { animation: float 6s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
  </style>

<body class="bg-background text-on-surface font-body overflow-hidden">
  <div id="app" class="h-screen w-screen overflow-hidden relative surface-layer"></div>
