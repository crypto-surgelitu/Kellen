<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Catch My Love</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Inter:wght@400;500;600&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: {
            DEFAULT: "var(--color-primary)",
            container: "var(--color-primary-container)",
            fixed: "var(--color-primary-fixed)",
            dim: "var(--color-primary-dim)"
          },
          secondary: {
            DEFAULT: "var(--color-secondary)",
            container: "var(--color-secondary-container)",
            dim: "var(--color-secondary-dim)"
          },
          tertiary: {
            DEFAULT: "var(--color-tertiary)",
            container: "var(--color-tertiary-container)",
            fixed: "var(--color-tertiary-fixed)",
            dim: "var(--color-tertiary-dim)"
          },
          surface: {
            DEFAULT: "var(--color-surface)",
            container: "var(--color-surface-container)",
            "container-low": "var(--color-surface-container-low)",
            "container-lowest": "var(--color-surface-container-lowest)",
            "container-high": "var(--color-surface-container-high)",
            "container-highest": "var(--color-surface-container-highest)",
            dim: "var(--color-surface-dim)",
            bright: "var(--color-surface-bright)",
            variant: "var(--color-surface-variant)",
            tint: "var(--color-surface-tint)"
          },
          background: "var(--color-background)",
          onPrimary: "var(--color-on-primary)",
          onPrimaryContainer: "var(--color-on-primary-container)",
          onSecondary: "var(--color-on-secondary)",
          onSecondaryContainer: "var(--color-on-secondary-container)",
          onTertiary: "var(--color-on-tertiary)",
          onTertiaryContainer: "var(--color-on-tertiary-container)",
          onSurface: "var(--color-on-surface)",
          onSurfaceVariant: "var(--color-on-surface-variant)",
          onBackground: "var(--color-on-background)",
          onError: "var(--color-on-error)",
          outline: "var(--color-outline)",
          outlineVariant: "var(--color-outline-variant)",
          error: {
            DEFAULT: "var(--color-error)",
            container: "var(--color-error-container)",
            dim: "var(--color-error-dim)"
          },
          inverseSurface: "var(--color-inverse-surface)",
          inverseOnSurface: "var(--color-inverse-on-surface)",
          inversePrimary: "var(--color-inverse-primary)"
        },
        fontFamily: {
          headline: ["Plus Jakarta Sans"],
          body: ["Inter"],
          label: ["Be Vietnam Pro"]
        }
      },
    },
  }
</script>
<style>
  :root {
    --color-primary: #a8275a;
    --color-primary-container: #ff709f;
    --color-primary-fixed: #ff709f;
    --color-primary-dim: #98184f;
    --color-secondary: #04647d;
    --color-secondary-container: #9ae1ff;
    --color-secondary-dim: #00576e;
    --color-tertiary: #6c5a00;
    --color-tertiary-container: #ffd709;
    --color-tertiary-fixed: #ffd709;
    --color-tertiary-dim: #5e4e00;
    --color-surface: #fbf6f1;
    --color-surface-container: #ece7e2;
    --color-surface-container-low: #f5f0eb;
    --color-surface-container-lowest: #ffffff;
    --color-surface-container-high: #e6e2dc;
    --color-surface-container-highest: #e1dcd6;
    --color-surface-dim: #d8d4cd;
    --color-surface-bright: #fbf6f1;
    --color-surface-variant: #e1dcd6;
    --color-surface-tint: #a8275a;
    --color-on-primary: #ffeff1;
    --color-on-primary-container: #4c0022;
    --color-on-primary-fixed: #000000;
    --color-on-primary-fixed-variant: #5d002b;
    --color-on-secondary: #e3f6ff;
    --color-on-secondary-container: #005267;
    --color-on-secondary-fixed: #003d4f;
    --color-on-secondary-fixed-variant: #005c74;
    --color-on-tertiary: #fff2cd;
    --color-on-tertiary-container: #5b4b00;
    --color-on-tertiary-fixed: #453900;
    --color-on-tertiary-fixed-variant: #665500;
    --color-on-surface: #302e2b;
    --color-on-surface-variant: #5d5b58;
    --color-on-background: #302e2b;
    --color-on-error: #ffefef;
    --color-background: #fbf6f1;
    --color-outline: #797672;
    --color-outline-variant: #b0aca8;
    --color-error: #b41340;
    --color-error-container: #f74b6d;
    --color-error-dim: #a70138;
    --color-inverse-surface: #0f0e0c;
    --color-inverse-on-surface: #a09c98;
    --color-inverse-primary: #ff6b9d;
  }
  
  .dark {
    --color-primary: #ff6b9d;
    --color-primary-container: #5d002b;
    --color-primary-fixed: #ff709f;
    --color-primary-dim: #f16092;
    --color-secondary: #8cd3f0;
    --color-secondary-container: #005267;
    --color-secondary-dim: #00576e;
    --color-tertiary: #efc900;
    --color-tertiary-container: #453900;
    --color-tertiary-fixed: #ffd709;
    --color-tertiary-dim: #5e4e00;
    --color-surface: #0f0e0c;
    --color-surface-container: #1a1917;
    --color-surface-container-low: #1c1b19;
    --color-surface-container-lowest: #0a0908;
    --color-surface-container-high: #252320;
    --color-surface-container-highest: #302e2b;
    --color-surface-dim: #0f0e0c;
    --color-surface-bright: #1a1917;
    --color-surface-variant: #3d3b38;
    --color-surface-tint: #ff6b9d;
    --color-on-primary: #5d002b;
    --color-on-primary-container: #ff709f;
    --color-on-primary-fixed: #000000;
    --color-on-primary-fixed-variant: #ff709f;
    --color-on-secondary: #003d4f;
    --color-on-secondary-container: #9ae1ff;
    --color-on-secondary-fixed: #e3f6ff;
    --color-on-secondary-fixed-variant: #8cd3f0;
    --color-on-tertiary: #453900;
    --color-on-tertiary-container: #ffd709;
    --color-on-tertiary-fixed: #000000;
    --color-on-tertiary-fixed-variant: #665500;
    --color-on-surface: #e6e2dc;
    --color-on-surface-variant: #a09c98;
    --color-on-background: #e6e2dc;
    --color-on-error: #ffefef;
    --color-background: #0f0e0c;
    --color-outline: #797672;
    --color-outline-variant: #4d4b48;
    --color-error: #f74b6d;
    --color-error-container: #510017;
    --color-error-dim: #a70138;
    --color-inverse-surface: #e6e2dc;
    --color-inverse-on-surface: #302e2b;
    --color-inverse-primary: #a8275a;
  }

  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .vibrant-gradient-bg { background: linear-gradient(135deg, #ff709f 0%, #ffd709 50%, #9ae1ff 100%); background-size: 400% 400%; }
  .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
  .dark .glass-panel { background: rgba(15, 14, 12, 0.7); }
  .bouncy-hover:hover { transform: scale(1.05); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .bouncy-hover:active { transform: scale(0.92); }
  .floating-heart { animation: float 6s ease-in-out infinite; }
  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }
  
  body { background-color: var(--color-surface); color: var(--color-on-surface); }
</style>
</head>
<body class="font-body overflow-x-hidden" style="background-color: var(--color-surface); color: var(--color-on-surface); transition: background-color 0.3s, color 0.3s;">
  <div id="app" class="h-screen w-screen overflow-hidden relative" style="background-color: var(--color-surface);"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
